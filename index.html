<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyGuru - Local Teaching & Tuition Job Portal</title>
    <!-- Supabase JS Library Integration -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --primary-color: #2c3e50;
            --secondary-color: #3498db;
            --success-color: #2ecc71;
            --danger-color: #e74c3c;
            --bg-color: #f5f7fa;
            --text-color: #34495e;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            padding: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .form-card {
            background: #ffffff;
            max-width: 750px;
            width: 100%;
            padding: 35px 25px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.05);
            border-top: 6px solid var(--secondary-color);
        }

        h2 {
            color: var(--primary-color);
            text-align: center;
            margin-bottom: 8px;
            font-size: 24px;
        }

        .subtitle {
            text-align: center;
            color: #7f8c8d;
            font-size: 14px;
            margin-bottom: 25px;
        }

        .user-type-selector {
            display: flex;
            justify-content: space-between;
            margin-bottom: 25px;
            gap: 10px;
        }

        .type-btn {
            flex: 1;
            padding: 12px 5px;
            border: 2px solid #ccd1d1;
            background: #fff;
            color: var(--primary-color);
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            text-align: center;
            transition: all 0.3s ease;
        }

        .type-btn.active {
            border-color: var(--secondary-color);
            background: var(--secondary-color);
            color: #fff;
        }

        .section-title {
            font-size: 16px;
            color: var(--primary-color);
            border-bottom: 2px solid #eaeded;
            padding-bottom: 5px;
            margin: 25px 0 15px 0;
            font-weight: 600;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .grid-3 {
            display: grid;
            grid-template-columns: 1.5fr 1fr 1fr;
            gap: 10px;
            margin-top: 8px;
            background: #fdfefe;
            padding: 8px;
            border: 1px dashed #d5dbdb;
            border-radius: 6px;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-weight: 600;
            font-size: 14px;
            color: #2c3e50;
        }

        input[type="text"], input[type="tel"], input[type="date"], select, textarea {
            width: 100%;
            padding: 11px;
            border: 1px solid #ccd1d1;
            border-radius: 6px;
            font-size: 15px;
            color: var(--text-color);
        }

        input:focus, select:focus, textarea:focus {
            border-color: var(--secondary-color);
            outline: none;
        }

        .dynamic-section {
            display: none;
        }

        .dynamic-section.active {
            display: block;
        }

        .conditional-box {
            display: none;
            margin-top: 10px;
            background: #f8f9f9;
            padding: 10px;
            border-radius: 6px;
            border-left: 3px solid var(--secondary-color);
        }

        .experience-block {
            background: #f4f7f6;
            padding: 15px;
            border-radius: 8px;
            border-left: 4px solid var(--primary-color);
            margin-bottom: 15px;
            position: relative;
        }

        .action-btn {
            padding: 8px 14px;
            font-size: 13px;
            font-weight: bold;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            margin-top: 5px;
        }

        .add-btn {
            background: var(--secondary-color);
            color: white;
        }

        .remove-btn {
            background: var(--danger-color);
            color: white;
            position: absolute;
            top: 10px;
            right: 10px;
        }

        .gps-btn {
            background: #34495e;
            color: white;
            border: none;
            padding: 10px 15px;
            font-size: 13px;
            border-radius: 4px;
            cursor: pointer;
            margin-bottom: 8px;
            font-weight: bold;
        }

        .checkbox-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 10px;
            background: #f8f9f9;
            padding: 12px;
            border-radius: 6px;
            max-height: 200px;
            overflow-y: auto;
        }

        .checkbox-item {
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            font-size: 13px;
        }

        .submit-btn {
            width: 100%;
            padding: 14px;
            background: var(--success-color);
            border: none;
            color: white;
            font-size: 18px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            margin-top: 25px;
        }

        .submit-btn:disabled {
            background: #bdc3c7;
            cursor: not-allowed;
        }

        @media (max-width: 600px) {
            .grid-2 { grid-template-columns: 1fr; }
            .grid-3 { grid-template-columns: 1fr; }
        }
    </style>
</head>

    function getLocation(inputId) {
        const inputField = document.getElementById(inputId);
        if (navigator.geolocation) {

            navigator.geolocation.getCurrentPosition(
                (position) => {
                    inputField.value = `${position.coords.latitude}, ${position.coords.longitude}`;
                },
                (error) => {
                    alert("GPS Signal tracking failed. Please copy and paste Google Maps coordinates manually.");
                    inputField.placeholder = "Manual Entry (Latitude, Longitude)";
                }
            );
        } else {
            alert("Your browser environment does not support device location feature tracking APIs.");
        }
    }

            } else if (activeTab === 'parent') {
                const parentData = {
                    parent_name: document.getElementById('pName').value,
                    mobile: document.getElementById('pMobile').value,
                    address: document.getElementById('pAddress').value,
                    pincode: document.getElementById('pPincode').value,
                    gps_location: document.getElementById('pGps').value,
                    status: 'Approved'
                };

                const { data, error } = await _supabase.from('parents_reg').insert([parentData]);
                if (error) throw error;
                alert("Parent Registration Setup complete in active deployment live arrays!");
            }

            document.getElementById('mainPortalForm').reset();
        } catch (err) {
            console.error(err);
            alert("Database Error Connection Injection Fault Failure: " + err.message);
        } finally {
            submitBtn.disabled = false;
            submitBtn.innerText = "Register Profile Account";
        }
    }
</script>
</body>
</html>
