<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyGuru - User Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', system-ui, sans-serif; }

        body {
            background: linear-gradient(-45deg, #0f172a, #1e1b4b, #111827, #0f172a);
            background-size: 400% 400%;
            animation: gradientBg 18s ease infinite;
            min-height: 100vh;
            color: #ffffff;
            padding: 20px;
        }

        @keyframes gradientBg {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container { max-width: 1000px; margin: 0 auto; }

        header {
            background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08); padding: 20px; border-radius: 16px;
            display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px;
        }

        .user-name { color: #3b82f6; text-shadow: 0 0 15px rgba(59,130,246,0.4); }

        .btn-logout {
            background: rgba(231, 76, 60, 0.2); border: 1px solid rgba(231, 76, 60, 0.4);
            color: #f87171; padding: 8px 18px; border-radius: 8px; cursor: pointer; font-weight: 600;
        }

        .dashboard-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 25px; }

        .glass-card {
            background: rgba(255, 255, 255, 0.04); backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 20px; padding: 25px;
        }

        .card-title { font-size: 18px; font-weight: 600; margin-bottom: 20px; border-bottom: 1px solid rgba(255,255,255,0.08); padding-bottom: 10px; color: #cbd5e1; }

        .badge { display: inline-block; padding: 4px 10px; border-radius: 6px; font-size: 12px; font-weight: bold; margin-top: 5px; }
        .badge.free { background: rgba(148, 163, 184, 0.15); color: #cbd5e1; }

        .btn-action {
            display: inline-block; width: 100%; padding: 12px; background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            border: none; color: white; font-weight: 600; border-radius: 10px; cursor: pointer; text-align: center; text-decoration: none; margin-top: 15px;
        }

        .profile-item { margin-bottom: 12px; font-size: 14px; color: #94a3b8; }
        .profile-item strong { color: #f1f5f9; }
        .dynamic-section { display: none; }
        .dynamic-section.active { display: block; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Welcome, <span id="lblUserName" class="user-name">User</span> గారు!</h1>
        <button class="btn-logout" onclick="logoutSessionRouter()"> Explicit Logout</button>
    </header>

    <div class="dashboard-grid">
        <div class="glass-card">
            <div class="card-title">🔐 Account Membership</div>
            <div class="profile-item">Account Category: <strong id="lblUserRole">Teacher</strong></div>
            <div class="profile-item">Registered Mobile: <strong id="lblUserMobile">...</strong></div>
            <div class="profile-item">Subscription Plan: <span id="lblUserSub" class="badge free">Free Plan</span></div>
            <a href="subscription.html" class="btn-action" style="background: linear-gradient(135deg, #f1c40f, #f39c12); color:#1e1b4b;">🌟 Upgrade to Premium</a>
        </div>

        <div class="glass-card">
            <div class="card-title">📊 Operational Controls Dashboard</div>
            
            <div id="sectionTeacher" class="dynamic-section active">
                <div class="profile-item">Home Tuition Availability: <strong id="lblHomeTuitionTag">No</strong></div>
                <div id="teacherUsageCounter"></div> 
                <button class="btn-action" id="btnBrowseJobs" onclick="alert('Exploring vacancy maps...')">🔍 Browse Tuition Jobs</button>
            </div>

            <div id="sectionSchool" class="dynamic-section">
                <div class="profile-item">Active Posted Openings: <strong>0 / 2 Allowed</strong></div>
                <button class="btn-action" style="background: linear-gradient(135deg, #2ecc71, #27ae60);">➕ Post New Vacancy</button>
            </div>

            <div id="sectionParent" class="dynamic-section">
                <div class="profile-item">Your Tuition Requirements: <strong>0 Active</strong></div>
                <button class="btn-action" style="background: linear-gradient(135deg, #a569bd, #8e44ad);">📝 Post Requirement</button>
            </div>
        </div>
    </div>
</div>

<script>
    const SUPABASE_URL = "https://iaaetymxqyjrgwrzrimp.supabase.co";
    const SUPABASE_KEY = "sb_publishable_oJygo7fFvotF8rmA1TNWlQ_8tPzCr2R"; 
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    window.onload = function() {
        validateUserSession();
    };

    async function validateUserSession() {
        const sessionDataStr = localStorage.getItem('myguru_user');
        
        // 💡 డెెవలప్‌మెంట్ కోసం లాక్ తీసేసి డెమో డేటా సెట్ చేశాను, దీనివల్ల డైరెక్ట్ ఓపెన్ చేసినా ఎర్రర్ రాదు!
        const user = sessionDataStr ? JSON.parse(sessionDataStr) : {
            name: "Demo User", mobile: "9999999999", roleType: "Teacher", roleTable: "teachers_reg", subscription: "Free"
        };

        document.getElementById('lblUserName').innerText = user.name;
        document.getElementById('lblUserMobile').innerText = user.mobile;
        document.getElementById('lblUserRole').innerText = user.roleType;
        
        // రోల్ బట్టి సెక్షన్ చూపిస్తాం
        document.querySelectorAll('.dynamic-section').forEach(el => el.classList.remove('active'));
        if(user.roleTable === 'teachers_reg') {
            document.getElementById('sectionTeacher').classList.add('active');
            await checkApplicationLimit(user.mobile, user.subscription);
        } else if(user.roleTable === 'schools_reg') {
            document.getElementById('sectionSchool').classList.add('active');
        } else if(user.roleTable === 'parents_reg') {
            document.getElementById('sectionParent').classList.add('active');
        }
    }

    async function checkApplicationLimit(teacherMobile, subStatus) {
        try {
            const currentMonth = new Date().toISOString().substring(0, 7);
            const { count } = await _supabase
                .from('job_applications')
                .select('*', { count: 'exact', head: true })
                .eq('teacher_mobile', teacherMobile)
                .gte('applied_at', `${currentMonth}-01T00:00:00Z`);

            const appCount = count || 0;
            const counterDiv = document.getElementById('teacherUsageCounter');
            
            counterDiv.innerHTML = `
                <div style="margin: 15px 0; padding:12px; background:rgba(231,76,60,0.1); border:1px solid rgba(231,76,60,0.2); border-radius:8px; font-size:14px;">
                    📊 Monthly Limit: <strong style="color:#e74c3c;">${appCount} / 3 Applications Used</strong>
                </div>
            `;
        } catch (err) { console.error(err); }
    }

    function logoutSessionRouter() {
        localStorage.removeItem('myguru_user');
        window.location.href = "home.html";
    }
</script>
</body>
</html>
