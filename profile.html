<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyGuru - My Profile</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body {
            background: linear-gradient(-45deg, #0f172a, #1e1b4b, #311042, #0f172a);
            min-height: 100vh; display: flex; flex-direction: column; align-items: center; color: white;
        }
        /* TOP BAND & NAV COPIED FOR UNIFORM LOOK */
        .top-header-band {
            width: 100%; background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1); padding: 15px 30px; display: flex; align-items: center; gap: 20px;
        }
        .header-title-bar {
            font-size: 24px; font-weight: 800; background: linear-gradient(135deg, #ffffff, #3b82f6, #a855f7, #ffffff);
            background-size: 200% auto; -webkit-background-clip: text; -webkit-text-fill-color: transparent; animation: textShine 4s linear infinite;
        }
        @keyframes textShine { to { background-position: 200% center; } }
        .top-nav-bar { width: 100%; background: rgba(15, 23, 42, 0.4); padding: 10px 30px; display: flex; gap: 25px; border-bottom: 1px solid rgba(255, 255, 255, 0.05); }
        .nav-link { color: #cbd5e1; text-decoration: none; font-size: 14px; font-weight: 600; cursor: pointer; }
        .nav-link:hover { color: #3b82f6; }

        /* PROFILE CARD */
        .main-wrapper { flex: 1; display: flex; justify-content: center; align-items: center; width: 100%; padding: 40px 20px; }
        .glass-card {
            background: rgba(255, 255, 255, 0.04); border-radius: 24px; padding: 35px;
            backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.12);
            width: 100%; max-width: 500px; text-align: left;
        }
        h2 { text-align: center; margin-bottom: 25px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 10px; }
        .info-row { margin-bottom: 18px; font-size: 15px; color: #cbd5e1; }
        .info-row strong { color: white; font-size: 16px; }
    </style>
</head>
<body>

    <div class="top-header-band">
        <img src="https://via.placeholder.com/150x50/1e1b4b/ffffff?text=MyGuru+Logo" alt="MyGuru Logo" style="height:50px;">
        <div class="header-title-bar">My Guru - The Teachers Best Job Portal</div>
    </div>

    <div class="top-nav-bar">
        <a class="nav-link" onclick="window.location.href='dashboard.html'">Dashboard</a>
        <a class="nav-link" onclick="window.location.href='profile.html'" style="color: #3b82f6;">My Profile</a>
        <a class="nav-link" onclick="alert('Support channel active at: support@myguru.com')">Contact Support</a>
        <a class="nav-link" style="color: #f87171;" onclick="localStorage.removeItem('myguru_user'); window.location.href='home.html'">Logout</a>
    </div>

    <div class="main-wrapper">
        <div class="glass-card">
            <h2>👤 My Profile Account</h2>
            <div class="info-row">Full Name: <strong id="profName">Loading...</strong></div>
            <div class="info-row">Registered Mobile: <strong id="profMobile">Loading...</strong></div>
            <div class="info-row">Account Role: <strong id="profRole">Loading...</strong></div>
            <div class="info-row">Subscription Status: <strong id="profSub" style="color:#f1c40f;">Loading...</strong></div>
            <button onclick="window.location.href='dashboard.html'" style="width:100%; padding:12px; background:#3b82f6; border:none; color:white; font-weight:bold; border-radius:8px; cursor:pointer; margin-top:15px;">← Back to Dashboard</button>
        </div>
    </div>

<script>
    window.onload = function() {
        const uData = localStorage.getItem('myguru_user');
        if(!uData) {
            alert("No active session! Redirecting...");
            window.location.href = "home.html";
            return;
        }
        const user = JSON.parse(uData);
        document.getElementById('profName').innerText = user.name;
        document.getElementById('profMobile').innerText = user.mobile;
        document.getElementById('profRole').innerText = user.roleType;
        document.getElementById('profSub').innerText = user.subscription + " Plan Account";
    }
</script>
</body>
</html>
